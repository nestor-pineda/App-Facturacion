<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Facturación</title>
    <meta name="description" content="Aplicación de facturación y gestión de clientes." />

    <meta property="og:title" content="App Facturación" />
    <meta property="og:description" content="Aplicación de facturación y gestión de clientes." />
    <meta property="og:type" content="website" />


    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <!-- Blocking script: applies persisted theme before React mounts to prevent flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme-storage');
          var isDark =
            stored &&
            JSON.parse(stored).state &&
            JSON.parse(stored).state.theme === 'dark';
          document.documentElement.classList.toggle('dark', !!isDark);
        } catch (e) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
